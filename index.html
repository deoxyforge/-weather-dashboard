<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-day:    linear-gradient(160deg, #0f2c5e 0%, #1a4a8a 35%, #2d6cbf 65%, #4a90d9 100%);
    --sky-clear:  linear-gradient(160deg, #0a1f3d 0%, #0e3270 40%, #1557a0 70%, #2176c8 100%);
    --sky-cloud:  linear-gradient(160deg, #2c3e55 0%, #3d5470 40%, #556680 70%, #6d7f95 100%);
    --sky-rain:   linear-gradient(160deg, #1a1e2e 0%, #252b40 40%, #2e3550 70%, #3a4260 100%);
    --sky-snow:   linear-gradient(160deg, #263045 0%, #3a4a62 40%, #4d6278 70%, #617b94 100%);
    --sky-storm:  linear-gradient(160deg, #0d0f18 0%, #181c2e 40%, #222840 70%, #2a3050 100%);
    --accent: #64c8ff;
    --accent2: #ffd166;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.12);
    --text-main: #f0f4ff;
    --text-muted: rgba(240,244,255,0.6);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    min-height: 100vh;
    background: var(--sky-day);
    font-family: var(--font-body);
    color: var(--text-main);
    transition: background 1.2s ease;
    overflow-x: hidden;
  }

  /* Stars background */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,.2) 0%, transparent 100%);
    opacity: 0.6;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-main);
  }
  .logo span { color: var(--accent); }
  .time-display {
    text-align: right;
    font-size: 13px;
    color: var(--text-muted);
  }
  .time-display strong {
    display: block;
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -1px;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 36px;
  }
  .search-wrap input {
    width: 100%;
    padding: 16px 60px 16px 22px;
    border-radius: 16px;
    border: 1.5px solid var(--card-border);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 16px;
    outline: none;
    transition: border-color .3s, background .3s;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.12);
  }
  .search-wrap button {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none; border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    color: #0a1f3d;
    font-size: 18px;
    transition: opacity .2s, transform .1s;
  }
  .search-wrap button:hover { opacity: .85; transform: translateY(-50%) scale(1.05); }

  /* ── API Key Banner ── */
  .api-banner {
    background: rgba(255,209,102,0.15);
    border: 1.5px solid rgba(255,209,102,0.4);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 13.5px;
    color: #ffd166;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .api-banner input {
    flex: 1;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,209,102,0.4);
    border-radius: 8px;
    padding: 7px 12px;
    color: #ffd166;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
  }
  .api-banner input::placeholder { color: rgba(255,209,102,0.5); }
  .api-banner button {
    background: #ffd166; border: none;
    border-radius: 8px; padding: 7px 14px;
    cursor: pointer; color: #0a1f3d;
    font-size: 13px; font-weight: 500;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .api-banner button:hover { opacity: .85; }

  /* ── Main Card ── */
  .main-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1.5px solid var(--card-border);
    border-radius: 28px;
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeUp .5s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .main-card.visible { animation: fadeUp .5s ease forwards; }

  .city-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .city-name {
    font-family: var(--font-head);
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .country { font-size: 14px; color: var(--text-muted); margin-top: 5px; }
  .feels-like { font-size: 13px; color: var(--text-muted); text-align: right; }
  .feels-like strong { display: block; font-size: 22px; color: var(--text-main); font-family: var(--font-head); font-weight: 700; }

  .temp-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 22px;
  }
  .weather-icon { font-size: 80px; line-height: 1; filter: drop-shadow(0 4px 16px rgba(100,200,255,.3)); }
  .temp-big {
    font-family: var(--font-head);
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -5px;
    line-height: 1;
  }
  .temp-unit { font-size: 38px; font-weight: 400; color: var(--text-muted); }
  .desc {
    font-size: 18px;
    color: var(--text-muted);
    text-transform: capitalize;
    margin-top: 4px;
    font-weight: 300;
  }

  /* stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--card-border);
  }
  .stat {
    text-align: center;
  }
  .stat .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
  .stat .stat-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
  .stat .stat-unit { font-size: 12px; color: var(--text-muted); }

  /* ── Hourly ── */
  .section-title {
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .hourly-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card {
    flex-shrink: 0;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 1.5px solid var(--card-border);
    border-radius: 18px;
    padding: 14px 18px;
    text-align: center;
    min-width: 72px;
    animation: fadeUp .4s ease forwards;
    opacity: 0;
  }
  .hour-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .hour-icon { font-size: 24px; margin-bottom: 6px; }
  .hour-temp { font-family: var(--font-head); font-size: 16px; font-weight: 700; }

  /* ── 5-day ── */
  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 8px;
  }
  .day-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 1.5px solid var(--card-border);
    border-radius: 18px;
    padding: 16px 10px;
    text-align: center;
    animation: fadeUp .4s ease forwards;
    opacity: 0;
  }
  .day-name { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .6px; }
  .day-icon { font-size: 28px; margin-bottom: 8px; }
  .day-temps { font-family: var(--font-head); font-size: 14px; font-weight: 700; }
  .day-low { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ── Error / Loader ── */
  .error-msg {
    background: rgba(255,80,80,0.12);
    border: 1.5px solid rgba(255,80,80,0.3);
    border-radius: 14px;
    padding: 14px 18px;
    color: #ff9090;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }
  .loader {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
    font-size: 15px;
    display: none;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(100,200,255,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Sections wrap ── */
  .sections { display: none; }
  .sections.show { display: block; }
  .section-wrap { margin-bottom: 24px; }

  /* ── UV / Sunrise row ── */
  .extra-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .extra-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 1.5px solid var(--card-border);
    border-radius: 20px;
    padding: 20px 22px;
    animation: fadeUp .4s ease forwards;
    opacity: 0;
  }
  .extra-card .e-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
  .extra-card .e-val { font-family: var(--font-head); font-size: 28px; font-weight: 700; }
  .extra-card .e-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .sun-row { display: flex; gap: 20px; }
  .sun-item .s-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
  .sun-item .s-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; }

  /* Unit toggle */
  .unit-toggle {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 3px;
    border: 1px solid var(--card-border);
  }
  .unit-toggle button {
    background: none; border: none;
    color: var(--text-muted);
    font-family: var(--font-head);
    font-size: 14px; font-weight: 600;
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .unit-toggle button.active {
    background: var(--accent);
    color: #0a1f3d;
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .forecast-grid { grid-template-columns: repeat(3, 1fr); }
    .temp-big { font-size: 68px; }
    .weather-icon { font-size: 60px; }
    .city-name { font-size: 28px; }
    .extra-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="app">

  <header>
    <div class="logo">Sky<span>View</span></div>
    <div style="display:flex; gap:16px; align-items:center;">
      <div class="unit-toggle">
        <button class="active" onclick="switchUnit('metric')">°C</button>
        <button onclick="switchUnit('imperial')">°F</button>
      </div>
      <div class="time-display">
        <strong id="clock">--:--</strong>
        <span id="date-str">---</span>
      </div>
    </div>
  </header>

  <div class="api-banner" id="api-banner">
    <span>🔑</span>
    <input type="text" id="api-key-input" placeholder="Paste your OpenWeatherMap API key here…"/>
    <button onclick="saveApiKey()">Save Key</button>
  </div>

  <div class="search-wrap">
    <input type="text" id="city-input" placeholder="Search for a city… e.g. Jaipur, Mumbai, London"
      onkeydown="if(event.key==='Enter') fetchWeather()"/>
    <button onclick="fetchWeather()">🔍</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="loader" id="loader"><div class="spinner"></div>Fetching weather…</div>

  <!-- Main card -->
  <div class="main-card" id="main-card" style="display:none">
    <div class="city-row">
      <div>
        <div class="city-name" id="city-name">--</div>
        <div class="country" id="country-name">--</div>
      </div>
      <div class="feels-like">
        <span>Feels like</span>
        <strong id="feels-like">--°</strong>
        <div style="font-size:12px; margin-top:4px; color:var(--text-muted)" id="local-time">--</div>
      </div>
    </div>
    <div class="temp-row">
      <div class="weather-icon" id="weather-icon">☀️</div>
      <div>
        <div>
          <span class="temp-big" id="temp-big">--</span><span class="temp-unit" id="temp-unit">°C</span>
        </div>
        <div class="desc" id="weather-desc">--</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-val" id="humidity">--<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-val" id="wind">--<span class="stat-unit" id="wind-unit"> km/h</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-val" id="pressure">--<span class="stat-unit"> hPa</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-val" id="visibility">--<span class="stat-unit"> km</span></div>
      </div>
    </div>
  </div>

  <div class="sections" id="sections">

    <!-- Sunrise/Sunset + UV -->
    <div class="extra-grid">
      <div class="extra-card" style="animation-delay:.1s">
        <div class="e-label">☀️ Sunrise / Sunset</div>
        <div class="sun-row">
          <div class="sun-item"><div class="s-label">Rise</div><div class="s-val" id="sunrise">--</div></div>
          <div class="sun-item"><div class="s-label">Set</div><div class="s-val" id="sunset">--</div></div>
        </div>
      </div>
      <div class="extra-card" style="animation-delay:.15s">
        <div class="e-label">🌬️ Wind direction</div>
        <div class="e-val" id="wind-dir">--</div>
        <div class="e-sub" id="wind-dir-deg">--</div>
      </div>
    </div>

    <!-- Hourly -->
    <div class="section-wrap">
      <div class="section-title">Hourly forecast</div>
      <div class="hourly-scroll" id="hourly-scroll"></div>
    </div>

    <!-- 5-day -->
    <div class="section-wrap">
      <div class="section-title">5-day forecast</div>
      <div class="forecast-grid" id="forecast-grid"></div>
    </div>

  </div>
</div>

<script>
let API_KEY = localStorage.getItem('owm_api_key') || '';
let currentUnit = 'metric';
let lastCity = '';

// Show/hide API banner
if (API_KEY) document.getElementById('api-banner').style.display = 'none';

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  API_KEY = val;
  localStorage.setItem('owm_api_key', val);
  document.getElementById('api-banner').style.display = 'none';
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date-str').textContent =
    now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

// Unit switch
function switchUnit(unit) {
  currentUnit = unit;
  document.querySelectorAll('.unit-toggle button').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && unit==='metric') || (i===1 && unit==='imperial'));
  });
  document.getElementById('temp-unit').textContent = unit === 'metric' ? '°C' : '°F';
  document.getElementById('wind-unit').textContent = unit === 'metric' ? ' km/h' : ' mph';
  if (lastCity) fetchWeather(lastCity);
}

// Weather condition → emoji + sky
const condMap = {
  '01d':'☀️','01n':'🌙','02d':'⛅','02n':'🌥️','03d':'☁️','03n':'☁️',
  '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
  '11d':'⛈️','11n':'⛈️','13d':'🌨️','13n':'🌨️','50d':'🌫️','50n':'🌫️'
};
const skyMap = {
  '01':'--sky-clear','02':'--sky-day','03':'--sky-cloud','04':'--sky-cloud',
  '09':'--sky-rain','10':'--sky-rain','11':'--sky-storm','13':'--sky-snow','50':'--sky-cloud'
};

function setSky(icon) {
  const code = icon.slice(0,2);
  const grad = skyMap[code] || '--sky-day';
  document.body.style.background = `var(${grad})`;
}

function degToCompass(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45) % 8];
}

function fmtTime(unix, offset) {
  const d = new Date((unix + offset) * 1000);
  return d.toUTCString().slice(17,22);
}

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

async function fetchWeather(cityOverride) {
  const city = cityOverride || document.getElementById('city-input').value.trim();
  if (!city) return;
  if (!API_KEY) {
    showError('Please enter your OpenWeatherMap API key above first.');
    return;
  }
  lastCity = city;
  hide('error-msg');
  show('loader'); document.getElementById('loader').style.display = 'flex'; document.getElementById('loader').style.flexDirection = 'column';
  hide('main-card'); document.getElementById('sections').classList.remove('show');

  try {
    const [curRes, fcastRes] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=${currentUnit}&appid=${API_KEY}`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=${currentUnit}&appid=${API_KEY}`)
    ]);

    if (!curRes.ok) {
      const err = await curRes.json();
      throw new Error(err.message || 'City not found');
    }

    const cur = await curRes.json();
    const fcast = await fcastRes.json();
    hide('loader');
    renderCurrent(cur);
    renderHourly(fcast);
    renderForecast(fcast);
  } catch (e) {
    hide('loader');
    showError('⚠️ ' + e.message + '. Check city name or API key.');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderCurrent(d) {
  const icon = d.weather[0].icon;
  const unit = currentUnit === 'metric' ? '°C' : '°F';
  const windUnit = currentUnit === 'metric' ? ' km/h' : ' mph';
  const windSpeed = currentUnit === 'metric'
    ? Math.round(d.wind.speed * 3.6) : Math.round(d.wind.speed);

  setSky(icon);
  document.getElementById('weather-icon').textContent = condMap[icon] || '🌤️';
  document.getElementById('city-name').textContent = d.name;
  document.getElementById('country-name').textContent = `${d.sys.country} · ${d.coord.lat.toFixed(1)}°N, ${d.coord.lon.toFixed(1)}°E`;
  document.getElementById('temp-big').textContent = Math.round(d.main.temp);
  document.getElementById('temp-unit').textContent = unit;
  document.getElementById('weather-desc').textContent = d.weather[0].description;
  document.getElementById('feels-like').textContent = Math.round(d.main.feels_like) + unit;
  document.getElementById('humidity').innerHTML = d.main.humidity + '<span class="stat-unit">%</span>';
  document.getElementById('wind').innerHTML = windSpeed + `<span class="stat-unit">${windUnit}</span>`;
  document.getElementById('pressure').innerHTML = d.main.pressure + '<span class="stat-unit"> hPa</span>';
  document.getElementById('visibility').innerHTML = (d.visibility/1000).toFixed(1) + '<span class="stat-unit"> km</span>';
  document.getElementById('sunrise').textContent = fmtTime(d.sys.sunrise, d.timezone);
  document.getElementById('sunset').textContent = fmtTime(d.sys.sunset, d.timezone);
  document.getElementById('wind-dir').textContent = degToCompass(d.wind.deg);
  document.getElementById('wind-dir-deg').textContent = d.wind.deg + '° — ' + (d.wind.gust ? `Gust ${Math.round(d.wind.gust * (currentUnit==='metric'?3.6:1))} ${currentUnit==='metric'?'km/h':'mph'}` : 'No gusts');

  const localDate = new Date((Date.now()/1000 + d.timezone - new Date().getTimezoneOffset()*60) * 1000);
  document.getElementById('local-time').textContent = 'Local: ' + localDate.toUTCString().slice(17,22);

  show('main-card');
  document.getElementById('main-card').classList.add('visible');
  document.getElementById('sections').classList.add('show');
}

function renderHourly(fcast) {
  const container = document.getElementById('hourly-scroll');
  container.innerHTML = '';
  const items = fcast.list.slice(0,8);
  const unit = currentUnit === 'metric' ? '°C' : '°F';
  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'hour-card';
    d.style.animationDelay = (i * 0.05) + 's';
    const h = new Date(item.dt * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const icon = condMap[item.weather[0].icon] || '🌤️';
    d.innerHTML = `<div class="hour-label">${h}</div>
      <div class="hour-icon">${icon}</div>
      <div class="hour-temp">${Math.round(item.main.temp)}${unit}</div>`;
    container.appendChild(d);
  });
}

function renderForecast(fcast) {
  const container = document.getElementById('forecast-grid');
  container.innerHTML = '';
  const unit = currentUnit === 'metric' ? '°C' : '°F';
  // Group by day (take midday reading)
  const days = {};
  fcast.list.forEach(item => {
    const d = new Date(item.dt * 1000);
    const key = d.toDateString();
    if (!days[key]) days[key] = [];
    days[key].push(item);
  });

  Object.entries(days).slice(0,5).forEach(([key, items], i) => {
    const temps = items.map(x => x.main.temp);
    const high = Math.round(Math.max(...temps));
    const low  = Math.round(Math.min(...temps));
    const midItem = items[Math.floor(items.length/2)];
    const icon = condMap[midItem.weather[0].icon] || '🌤️';
    const dayName = new Date(key).toLocaleDateString([], { weekday: 'short' });

    const d = document.createElement('div');
    d.className = 'day-card';
    d.style.animationDelay = (i * 0.07) + 's';
    d.innerHTML = `<div class="day-name">${dayName}</div>
      <div class="day-icon">${icon}</div>
      <div class="day-temps">${high}${unit}</div>
      <div class="day-low">${low}${unit}</div>`;
    container.appendChild(d);
  });
}

// Load Jaipur by default if key exists
window.addEventListener('load', () => {
  if (API_KEY) {
    document.getElementById('city-input').value = 'Jaipur';
    fetchWeather('Jaipur');
  }
});
</script>
